        .social-icon {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
    text-decoration: none;
    color: #fff;
    background: linear-gradient(145deg, #222, #000);
    box-shadow: 0 8px 20px rgba(0,0,0,0.35);
    transition: all 0.35s ease;
    position: relative;
    overflow: hidden;
}



/* حركة عامة */
.social-icon:hover {
    transform: translateY(-8px) scale(1.12);
}

/* Glow */
.social-icon::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 50%;
    opacity: 0;
    transition: 0.35s;
}

/* X */
/* التنسيق العام للأيقونات لجعلها شفافة */
.social-icon {
    background: transparent; /* جعل الخلفية شفافة لكل الأيقونات */
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    transition: all 0.3s ease;
}

/* X (Twitter) */
/* 1. تعريف حركة النبض */
@keyframes pulse-animation {
    0% {
        transform: scale(1);
    }
    50% {
        transform: scale(1.1); /* تكبير بسيط */
    }
    100% {
        transform: scale(1);
    }
}

/* 2. إضافة التأثير للأيقونات عند الـ Hover */
.social-icon:hover {
    animation: pulse-animation 0.6s infinite ease-in-out;
    z-index: 10; /* عشان تظهر فوق الباقي وهي بتكبر */
}

/* 3. تعديل الـ Shadow ليكون متناسق مع النبض (اختياري لزيادة الجمالية) */
.social-icon::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    border-radius: 50%;
    opacity: 0;
    transition: opacity 0.3s ease;
}

/* Snapchat الاستثناء (الخلفية ملونة والنبض شغال عليها) */
.social-icon.snapchat:hover {
    background: #fffc00;
    box-shadow: 0 0 30px #fffc00; /* توهج خارجي مع النبض */
}

/* تليجرام - نبض بلونه الخاص */
.social-icon.telegram:hover {
    color: #0088cc;
    text-shadow: 0 0 15px rgba(0, 136, 204, 0.7);
}

/* TikTok - نبض بتوهج ألوانه */
.social-icon.tiktok:hover {
    text-shadow: 2px 2px 10px #ff0050, -2px -2px 10px #00f2ea;
}

/* X - نبض أبيض صافي */
.social-icon.x:hover {
    text-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
}
/* التنسيق الأساسي للأيقونة (بدون خلفية) */
.social-icon {
    width: 60px; /* يمكنك تعديل الحجم حسب تصميمك */
    height: 60px;
    background: transparent; /* الخلفية شفافة في الحالة العادية */
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 25px;
    position: relative;
    transition: all 0.4s ease; /* تنعيم ظهور اللون */
    text-decoration: none;
}

/* حركة النبض */
@keyframes pulse-animation {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
}

/* تأثير الـ Hover العام: يظهر اللون وتعمل الحركة */
.social-icon:hover {
    animation: pulse-animation 0.8s infinite ease-in-out;
    color: #fff !important; /* تغيير لون الشعار للأبيض عند ظهور الخلفية */
}

/* 1. X (Twitter) */
.social-icon.x { color: #000; } /* لون الشعار الافتراضي */
.social-icon.x:hover {
    background: #000; /* تظهر الخلفية السوداء عند الهوفر */
    box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
}

/* 2. Snapchat */
/* سناب شات يظهر بخلفية صفراء فقط عند الهوفر حسب طلبك الأخير */
.social-icon.snapchat { color: #fffc00; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }
.social-icon.snapchat:hover {
    background: #fffc00;
    color: #000 !important;
    box-shadow: 0 0 20px rgba(255, 252, 0, 0.6);
}

/* 3. TikTok */
.social-icon.tiktok { color: #000; }
.social-icon.tiktok:hover {
    background: #000;
    box-shadow: 5px 0 15px #ff0050, -5px 0 15px #00f2ea;
}

/* 4. Telegram */
.social-icon.telegram { color: #0088cc; }
.social-icon.telegram:hover {
    background: #0088cc;
    box-shadow: 0 0 20px rgba(0, 136, 204, 0.6);
}

.lang-switcher {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 1000;
}

.btn-lang {
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(10px); /* تأثير الزجاج الضبابي */
    border: 1px solid rgba(255, 255, 255, 0.2);
    color: white;
    padding: 8px 16px;
    border-radius: 30px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 500;
    transition: all 0.3s ease;
    cursor: pointer;
}

.btn-lang:hover {
    background: rgba(255, 255, 255, 0.25);
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

.btn-lang i {
    font-size: 1.1rem;
}

.small-icon {
    font-size: 0.7rem !important;
}


/* لما الصفحة تكون عربي، الزرار ينقل نفسه للشمال تلقائياً */
[dir="rtl"] .lang-switcher {
    right: auto;
    left: 20px;
}


/* تعديلات الموبايل */
@media (max-width: 768px) {
    .lang-switcher {
        top: 10px;
        right: 10px;
    }
    
    [dir="rtl"] .lang-switcher {
        left: 10px;
        right: auto;
    }

    .btn-lang {
        padding: 6px 12px;
        font-size: 12px;
    }

    /* تصغير الأيقونة في الموبايل */
    .btn-lang i {
        font-size: 0.9rem;
    }
}

function switchLanguage(lang) {
    document.documentElement.lang = lang;
    document.documentElement.dir = lang === "ar" ? "rtl" : "ltr";

    document.querySelectorAll("[data-i18n]").forEach(el => {
        const key = el.getAttribute("data-i18n");
        if (translations[lang] && translations[lang][key]) {
            el.innerHTML = translations[lang][key];
        }
    });

    // تحديث شكل الأيقونة النشطة جوه الـ Apps Grid
    document.querySelectorAll('.lang-option').forEach(item => item.classList.remove('active'));
    document.getElementById('lang-' + lang).classList.add('active');

    localStorage.setItem("preferredLanguage", lang);
}

// تشغيل اللغة المحفوظة عند فتح الصفحة
document.addEventListener("DOMContentLoaded", () => {
    const savedLang = localStorage.getItem("preferredLanguage") || "en";
    switchLanguage(savedLang);
});
